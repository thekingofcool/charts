<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>financial dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0f1117;
  --bg2:     #181c27;
  --bg3:     #1e2433;
  --bg4:     #252b3b;
  --border:  #2e3548;
  --ink:     #e8eaf0;
  --ink2:    #a0a8bc;
  --ink3:    #5a6280;
  --blue:    #4a8fff;
  --blue2:   #1a5acc;
  --orange:  #ff9a3c;
  --orange2: #cc6800;
  --red:     #ff5a6e;
  --red2:    #cc2238;
  --green:   #36c97e;
  --green2:  #1a8a52;
  --px: 1px;
  --mono: 'Share Tech Mono', monospace;
  --pixel: 'Press Start 2P', monospace;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap; /* [优化] 移动端自适应折行 */
  position: sticky; top: 0; z-index: 200;
}
.logo {
  font-family: var(--pixel); font-size: 14px; /* [优化] 增大字号 */
  color: var(--blue); letter-spacing: 2px;
}
.ticker-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.ticker-btn {
  font-family: var(--pixel); font-size: 10px; /* [优化] 增大字号 */
  padding: 8px 12px; border-radius: var(--radius);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--ink2); cursor: pointer; transition: all .12s;
}
.ticker-btn:hover { border-color: var(--blue); color: var(--blue); }
.ticker-btn.active { background: var(--blue2); border-color: var(--blue); color: #fff; }
.meta-info { margin-left: auto; font-size: 12px; color: var(--ink3); text-align: right; line-height: 1.7; }

/* ── CONTROLS ── */
.controls {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 8px 24px; display: flex; gap: 12px; align-items: center;
  flex-wrap: wrap; /* [优化] */
}
.ctrl-label { font-family: var(--pixel); font-size: 10px; color: var(--ink3); text-transform: uppercase; }
.period-picker { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.period-btn {
  font-family: var(--pixel); font-size: 10px; padding: 8px 14px; /* [优化] */
  background: transparent; border: none; color: var(--ink2); cursor: pointer; transition: all .1s;
}
.period-btn + .period-btn { border-left: 1px solid var(--border); }
.period-btn.active { background: var(--blue2); color: #fff; }
.period-btn:hover:not(.active) { color: var(--blue); }

/* ── MAIN LAYOUT ── */
main {
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 16px;
  max-width: 1600px;
  margin: 0 auto;
}
.col-full { grid-column: 1 / -1; }

/* ── CARD ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; /* [优化] */
  background: var(--bg3);
}
.card-title {
  font-family: var(--pixel); font-size: 12px; color: var(--ink); letter-spacing: 1px; /* [优化] */
}
.card-body { padding: 16px; }

.chart-scroll-wrap {
  width: 100%;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--border) var(--bg3);
}

/* ── SANKEY NAV ── */
.sankey-nav { display: flex; align-items: center; gap: 8px; }
.nav-arrow {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--bg4); border: 1px solid var(--border); border-radius: 4px;
  color: var(--ink2); cursor: pointer; font-size: 14px; user-select: none;
  transition: all .1s;
}
.nav-arrow:hover { border-color: var(--blue); color: var(--blue); }
.nav-period-label {
  font-family: var(--pixel); font-size: 10px; color: var(--orange); /* [优化] */
  min-width: 80px; text-align: center;
}

/* ── METRIC TABS ── */
.metric-tabs {
  display: flex; gap: 0;
  border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; flex-wrap: wrap;
}
.metric-tab {
  font-family: var(--pixel); font-size: 10px; padding: 8px 12px; /* [优化] */
  background: transparent; border: none; color: var(--ink2); cursor: pointer;
  border-right: 1px solid var(--border); white-space: nowrap; transition: all .1s;
}
.metric-tab:last-child { border-right: none; }
.metric-tab.active { background: var(--bg4); color: var(--orange); }
.metric-tab:hover:not(.active) { color: var(--ink); }

/* ── KPI ROW ── */
.kpi-row {
  display: flex; gap: 12px; flex-wrap: wrap;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.kpi {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 14px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 4px; min-width: 120px;
  flex: 1 1 auto; /* [优化] 让指标块在移动端更好地平铺铺满 */
}
.kpi-label { font-size: 12px; color: var(--ink3); } /* [优化] */
.kpi-value { font-size: 20px; font-weight: 700; color: var(--ink); letter-spacing: 0.5px; } /* [优化] */
.kpi-value.pos { color: var(--green); }
.kpi-value.neg { color: var(--red); }
.kpi-delta { font-size: 12px; } /* [优化] */
.kpi-delta.pos { color: var(--green); }
.kpi-delta.neg { color: var(--red); }

/* ── LEGEND ── */
.legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 10px 0 2px; font-size: 12px; color: var(--ink2); align-items: center;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-line { width: 20px; height: 2px; flex-shrink: 0; }
.legend-dash { width: 20px; border-top: 2px dashed var(--blue); flex-shrink: 0; }

/* ── SANKEY COLORS ── */
.node-revenue { fill: var(--blue); }
.node-cost    { fill: var(--orange); }
.node-profit  { fill: var(--red); }

/* ── TOOLTIP ── */
.tooltip {
  position: fixed; z-index: 999;
  background: var(--bg3); color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono); font-size: 12px; line-height: 1.7;
  padding: 10px 14px;
  pointer-events: none; opacity: 0;
  transition: opacity .1s;
  max-width: 220px;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.tip-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.tip-row { display: flex; justify-content: space-between; gap: 12px; }
.tip-key { color: var(--ink3); }
.tip-val { color: var(--ink); font-weight: 600; }
.tip-beat { color: var(--green); }
.tip-miss { color: var(--red); }

/* ── ANALYSIS GRID ── */
.analysis-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 16px;
}
@media(max-width:900px) { 
  main { grid-template-columns: 1fr; padding: 12px; } 
  .analysis-grid { grid-template-columns: 1fr; } /* [优化] 移动端设为单列 */
}
</style>
</head>
<body>

<header>
  <div class="logo">CHARTS</div>
  <div class="ticker-tabs" id="ticker-tabs"></div>
  <div class="meta-info" id="meta-info">—</div>
</header>

<div class="controls">
  <div class="period-picker">
    <button class="period-btn active" id="btn-q" onclick="setPeriod('quarterly')">季报</button>
    <button class="period-btn" id="btn-a" onclick="setPeriod('annual')">年报</button>
  </div>
</div>

<main>
  <div class="card col-full" id="card-sankey">
    <div class="card-header">
      <span class="card-title">收支拆解</span>
      <div class="sankey-nav">
        <div class="nav-arrow" id="nav-prev" onclick="shiftSankey(-1)">◀</div>
        <div class="nav-period-label" id="sankey-label">—</div>
        <div class="nav-arrow" id="nav-next" onclick="shiftSankey(+1)">▶</div>
      </div>
    </div>
    <div class="kpi-row" id="kpi-row"></div>
    <div class="card-body" style="padding:16px 16px 8px">
      <div class="chart-scroll-wrap">
        <svg id="sankey-svg" style="width:100%;overflow:visible;display:block"></svg>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>收入</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span>支出</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>利润</span>
      </div>
    </div>
  </div>

  <div class="card col-full">
    <div class="card-header">
      <span class="card-title">财报预测</span>
      <div class="metric-tabs" id="forecast-tabs"></div>
    </div>
    <div class="card-body">
      <div class="chart-scroll-wrap">
        <svg id="forecast-svg" style="width:100%;display:block"></svg>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="legend-dash"></span>预估</span>
        <span class="legend-item"><span class="legend-line" style="background:var(--orange)"></span>实际</span>
      </div>
    </div>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
// ── STATE ────────────────────────────────────────────────────
const S = {
  tickers:[], ticker:null, period:'quarterly',
  sankeyIdx:0, forecastMetric:'total_revenue',
  _sankeyAll:null, _trendAll:null, _estAll:null,
  sankey:{}, trend:{}, est:{}
};

const METRIC_LABELS = {
  total_revenue:'总收入', eps_diluted:'每股收益', operating_income:'营业利润'
};

const C = {
  revenue: '#4a8fff',
  revSub:  '#4a8fff',
  cogs:    '#c87832',
  gross:   '#c04040',
  rd:      '#d4922a',
  sga:     '#b87828',
  opEx:    '#c87832',
  opInc:   '#c04040',
  opLoss:  '#ff5a6e',
  tax:     '#9a8060',
  netInc:  '#c04040',
  netLoss: '#ff5a6e',
};

// ── TOOLTIP ──────────────────────────────────────────────────
const tipEl = document.getElementById('tooltip');
function showTip(html, e) {
  tipEl.innerHTML = html; tipEl.style.opacity=1;
  const x = Math.min(e.clientX+14, window.innerWidth-240);
  const y = Math.max(e.clientY-10, 4);
  tipEl.style.left=x+'px'; tipEl.style.top=y+'px';
}
function hideTip() { tipEl.style.opacity=0; }

// ── FORMAT ───────────────────────────────────────────────────
function fmt(v, metric) {
  if (v==null||isNaN(v)) return '—';
  if (metric==='eps_diluted') return (v<0?'':'+') + v.toFixed(2);
  const s=v<0?'-':'', a=Math.abs(v);
  if (a>=1e8) return s+(a/1e8).toFixed(2)+'亿';
  if (a>=1e4) return s+(a/1e4).toFixed(2)+'万';
  return s+a.toFixed(0);
}
function pctStr(a,b) { return (!b||!a)?'—':((a/b)*100).toFixed(2)+'%'; }
function colorNum(v) { return v>=0?'var(--green)':'var(--red)'; }

// ── DATA ─────────────────────────────────────────────────────
async function fetchCSV(p) {
  try { return d3.csvParse(await (await fetch(p)).text()); } catch { return []; }
}
async function fetchJSON(p) {
  try { return await (await fetch(p)).json(); } catch { return {}; }
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  const meta = await fetchJSON('data/meta.json');
  S.tickers = meta.tickers || ['U'];
  document.getElementById('meta-info').innerHTML =
    `数据更新: ${(meta.updated_at||'').slice(0,10)||'—'}<br>单位: 美元`;

  const tabs = document.getElementById('ticker-tabs');
  S.tickers.forEach(t => {
    const b=document.createElement('button');
    b.className='ticker-btn'; b.textContent='$'+t; b.id='tab-'+t;
    b.onclick=()=>selectTicker(t); tabs.appendChild(b);
  });

  [S._sankeyAll, S._trendAll, S._estAll] = await Promise.all([
    fetchCSV('data/sankey.csv'), fetchCSV('data/trend.csv'), fetchCSV('data/estimates.csv')
  ]);

  const ftabs = document.getElementById('forecast-tabs');
  Object.entries(METRIC_LABELS).forEach(([k,label]) => {
    const b=document.createElement('button');
    b.className='metric-tab'+(k===S.forecastMetric?' active':'');
    b.textContent=label; b.dataset.metric=k;
    b.onclick=()=>{
      S.forecastMetric=k;
      ftabs.querySelectorAll('.metric-tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); renderForecast();
    };
    ftabs.appendChild(b);
  });

  await selectTicker(S.tickers[0]);
}

async function selectTicker(t) {
  S.ticker=t;
  document.querySelectorAll('.ticker-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+t)?.classList.add('active');
  S.sankey[t]=S._sankeyAll.filter(r=>r.ticker===t);
  S.trend[t] =S._trendAll.filter(r=>r.ticker===t);
  S.est[t]   =S._estAll.filter(r=>r.ticker===t);
  S.sankeyIdx=getSankeyDates().length-1;
  renderSankey(); renderForecast();
}

function setPeriod(p) {
  S.period=p;
  document.getElementById('btn-q').classList.toggle('active',p==='quarterly');
  document.getElementById('btn-a').classList.toggle('active',p==='annual');
  S.sankeyIdx=getSankeyDates().length-1;
  renderSankey(); renderForecast();
}

// ── SANKEY ───────────────────────────────────────────────────
function getSankeyDates() {
  return [...new Set((S.sankey[S.ticker]||[])
    .filter(r=>r.period_type===S.period).map(r=>r.date))].sort();
}

function shiftSankey(d) {
  const dates=getSankeyDates();
  S.sankeyIdx=Math.max(0,Math.min(dates.length-1, S.sankeyIdx+d));
  renderSankey();
}

function renderSankey() {
  const dates=getSankeyDates(), date=dates[S.sankeyIdx];
  document.getElementById('sankey-label').textContent=date||'—';
  document.getElementById('nav-prev').style.opacity=S.sankeyIdx>0?1:0.3;
  document.getElementById('nav-next').style.opacity=S.sankeyIdx<dates.length-1?1:0.3;

  const rows=(S.sankey[S.ticker]||[]).filter(r=>r.period_type===S.period&&r.date===date);
  const svg=d3.select('#sankey-svg');
  svg.selectAll('*').remove();
  document.getElementById('kpi-row').innerHTML='';
  if (!rows.length) return;

  const r=rows[0];
  const g=k=>parseFloat(r[k])||0;

  const totalRev = g('total_revenue');
  const cogs     = g('cost_of_revenue');
  const grossP   = g('gross_profit');
  const rdExp    = g('rd_expense');
  const sgaExp   = g('sga_expense');
  const opInc    = g('operating_income');
  const tax      = Math.abs(g('tax_provision'));
  const netInc   = g('net_income');

  const kpis = [
    { label:'营业收入', value: totalRev, fmt:'rev' },
    { label:'毛利润',   value: grossP,   fmt:'rev', pct: pctStr(grossP, totalRev) },
    { label:'研发费用', value: rdExp,    fmt:'rev', pct: pctStr(rdExp, totalRev) },
    { label:'营业利润', value: opInc,    fmt:'rev', pct: pctStr(opInc, totalRev) },
    { label:'净利润',   value: netInc,   fmt:'rev', pct: pctStr(netInc, totalRev) },
  ];
  const kRow=document.getElementById('kpi-row');
  kpis.forEach(k=>{
    const pos=k.value>=0;
    kRow.innerHTML+=`<div class="kpi">
      <span class="kpi-label">${k.label}</span>
      <span class="kpi-value ${pos?'pos':'neg'}">${fmt(k.value,'total_revenue')}</span>
      ${k.pct!=null?`<span class="kpi-delta ${pos?'pos':'neg'}">${k.pct}</span>`:''}
    </div>`;
  });

  const body=document.getElementById('card-sankey');
  const W=Math.max(body.clientWidth-32, 600); 
  const H=Math.max(340, Math.round(W*0.38));
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('height',H).style('width', W + 'px');

  const MIN=1e5;

  const nodeList=[
    {id:0,name:'营业收入',    color:C.revenue,  type:'revenue'},
    {id:1,name:'销售成本',    color:C.cogs,     type:'cost'},
    {id:2,name:'毛利',        color:C.gross,    type:'profit'},
    {id:3,name:'研发费用',    color:C.rd,       type:'cost'},
    {id:4,name:'销售及行政',  color:C.sga,      type:'cost'},
    {id:5,name:'营业利润',    color:C.opInc,    type:'profit'},
    {id:6,name:'营业亏损',    color:C.opLoss,   type:'cost'},
    {id:7,name:'所得税',      color:C.tax,      type:'cost'},
    {id:8,name:'净利润',      color:C.netInc,   type:'profit'},
    {id:9,name:'净亏损',      color:C.netLoss,  type:'cost'},
  ];

  const links=[];

  // ── 核心流向逻辑重构 ──────────────────────────────────────────

  // Layer 1: Revenue → COGS + Gross
  if (totalRev>0) {
    links.push({source:0,target:1,value:Math.max(cogs,MIN)});
    links.push({source:0,target:2,value:Math.max(grossP,MIN)});
  }

  // Layer 2: Gross + (OpLoss Gap) → Opex (RD & SGA) + OpInc
  if (opInc >= 0) {
    // 盈利模式：毛利覆盖所有费用并产生利润
    links.push({source:2,target:3,value:Math.max(rdExp, MIN)});
    links.push({source:2,target:4,value:Math.max(sgaExp, MIN)});
    links.push({source:2,target:5,value:Math.max(opInc, MIN)});
  } else {
    // 亏损模式：毛利不足，由营业亏损(Node 6)填补缺口流入费用节点
    const totalOpex = rdExp + sgaExp;
    const rdRatio = totalOpex > 0 ? (rdExp / totalOpex) : 0.5;
    const sgaRatio = 1 - rdRatio;

    // 毛利按比例分配给研发和行政
    links.push({source:2,target:3,value:Math.max(grossP * rdRatio, MIN)});
    links.push({source:2,target:4,value:Math.max(grossP * sgaRatio, MIN)});
    
    // 亏损部分按比例分配补充研发和行政
    links.push({source:6,target:3,value:Math.max(rdExp - (grossP * rdRatio), MIN)});
    links.push({source:6,target:4,value:Math.max(sgaExp - (grossP * sgaRatio), MIN)});
  }

  // Layer 3: OpInc → Tax + Net Result
  if (opInc > 0) {
    links.push({source:5,target:7,value:Math.max(tax, MIN)});
    if (netInc >= 0) {
      links.push({source:5,target:8,value:Math.max(netInc, MIN)});
    } else {
      links.push({source:5,target:9,value:Math.max(Math.abs(netInc), MIN)});
    }
  }

  // ────────────────────────────────────────────────────────────

  const usedIds=new Set(links.flatMap(l=>[l.source,l.target]));
  const nodes=nodeList.filter(n=>usedIds.has(n.id)).map(d=>({...d}));

  const sankey=d3.sankey()
    .nodeId(d=>d.id)
    .nodeWidth(18)
    .nodePadding(20)
    .extent([[0,8],[W-170,H-8]]);

  let graph;
  try { graph=sankey({nodes,links:links.map(l=>({...l}))}); }
  catch(e){ console.warn(e); return; }

  const grp=svg.append('g');

  grp.selectAll('.sk-link')
    .data(graph.links)
    .join('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('fill','none')
    .attr('stroke', d => d.target.color)
    .attr('stroke-width', d=>Math.max(1,d.width))
    .attr('stroke-opacity', 0.18)
    .on('mousemove', (e,d)=>{
      showTip(`<div class="tip-title">${d.source.name} → ${d.target.name}</div>
        <div class="tip-row"><span class="tip-key">金额</span><span class="tip-val">${fmt(d.value,'total_revenue')}</span></div>
        <div class="tip-row"><span class="tip-key">占比</span><span class="tip-val">${pctStr(d.value,totalRev)}</span></div>`,e);
    })
    .on('mouseleave', hideTip);

  grp.selectAll('.sk-node')
    .data(graph.nodes)
    .join('rect')
    .attr('x',d=>d.x0).attr('y',d=>d.y0)
    .attr('width',d=>d.x1-d.x0).attr('height',d=>Math.max(2,d.y1-d.y0))
    .attr('fill',d=>d.color)
    .attr('rx',2)
    .on('mousemove',(e,d)=>{
      const v=d.value||0;
      let html=`<div class="tip-title">${d.name}</div>
        <div class="tip-row"><span class="tip-key">金额</span><span class="tip-val">${fmt(v,'total_revenue')}</span></div>
        <div class="tip-row"><span class="tip-key">占营收</span><span class="tip-val">${pctStr(v,totalRev)}</span></div>`;
      if (d.name==='毛利') html+=`<div class="tip-row"><span class="tip-key">毛利率</span><span class="tip-val">${pctStr(grossP,totalRev)}</span></div>`;
      if (d.name==='营业利润') html+=`<div class="tip-row"><span class="tip-key">营业利润率</span><span class="tip-val">${pctStr(opInc,totalRev)}</span></div>`;
      if (d.name==='净利润') html+=`<div class="tip-row"><span class="tip-key">净利率</span><span class="tip-val">${pctStr(netInc,totalRev)}</span></div>`;
      showTip(html,e);
    })
    .on('mouseleave',hideTip);

  grp.selectAll('.sk-name')
    .data(graph.nodes)
    .join('text')
    .attr('x', d=>d.x1+8)
    .attr('y', d=>(d.y0+d.y1)/2-8)
    .attr('dy','0.35em')
    .attr('font-family',"'Share Tech Mono',monospace")
    .attr('font-size', 13)
    .attr('font-weight','600')
    .attr('fill', d=>d.color)
    .text(d=>d.name);

  grp.selectAll('.sk-val')
    .data(graph.nodes)
    .join('text')
    .attr('x', d=>d.x1+8)
    .attr('y', d=>(d.y0+d.y1)/2+10)
    .attr('dy','0.35em')
    .attr('font-family',"'Share Tech Mono',monospace")
    .attr('font-size', 14)
    .attr('fill','#e8eaf0')
    .text(d=>fmt(d.value||0,'total_revenue'));

  ['毛利','营业利润','净利润'].forEach(name=>{
    const nd=graph.nodes.find(n=>n.name===name);
    if (!nd) return;
    const val=name==='毛利'?grossP:name==='营业利润'?opInc:netInc;
    grp.append('text')
      .attr('x',nd.x1+8).attr('y',nd.y0-5)
      .attr('font-family',"'Press Start 2P',monospace")
      .attr('font-size',9)
      .attr('fill',nd.color)
      .text(pctStr(val,totalRev));
  });
}

// ── FORECAST / ESTIMATES ─────────────────────────────────────
function renderForecast() {
  const metric=S.forecastMetric;
  const isEPS=metric==='eps_diluted';

  const actual=(S.trend[S.ticker]||[])
    .filter(r=>r.period_type===S.period&&r.metric===metric)
    .map(r=>({date:new Date(r.date),value:+r.value}))
    .sort((a,b)=>a.date-b.date);

  const estMap={};
  (S.est[S.ticker]||[])
    .filter(r=>r.period_type===S.period&&r.metric===metric)
    .forEach(r=>{ estMap[r.date]=+r.estimate; });

  const estPts=actual
    .map(d=>({ date:d.date, estimate:estMap[d3.timeFormat('%Y-%m-%d')(d.date)] }))
    .filter(d=>d.estimate!=null);

  const svg=d3.select('#forecast-svg');
  svg.selectAll('*').remove();
  if (!actual.length) return;

  const body=document.getElementById('card-sankey'); 
  const W=Math.max(body.clientWidth-32, 500); 
  const H=260;
  const M={top:30,right:20,bottom:44,left:isEPS?56:80};
  const iW=W-M.left-M.right, iH=H-M.top-M.bottom;

  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('height',H).style('width', W + 'px');
  const g=svg.append('g').attr('transform',`translate(${M.left},${M.top})`);

  const allVals=[...actual.map(d=>d.value),...estPts.map(d=>d.estimate)];
  const x=d3.scalePoint().domain(actual.map(d=>d.date)).range([0,iW]).padding(0.3);
  const yExt=d3.extent(allVals);
  const pad=(yExt[1]-yExt[0])*0.18||Math.abs(yExt[0])*0.15||1;
  const y=d3.scaleLinear().domain([yExt[0]-pad,yExt[1]+pad]).range([iH,0]).nice();

  if (yExt[0]<0&&yExt[1]>0) {
    g.append('line').attr('x1',0).attr('x2',iW)
      .attr('y1',y(0)).attr('y2',y(0))
      .attr('stroke',`rgba(255,255,255,0.12)`).attr('stroke-width',1)
      .attr('stroke-dasharray','4 3');
  }

  g.append('g').call(
    d3.axisLeft(y).ticks(5).tickFormat(v=>fmt(v,metric)).tickSize(-iW)
  ).call(g2=>{
    g2.select('.domain').remove();
    g2.selectAll('.tick line').attr('stroke',`rgba(255,255,255,0.06)`);
    g2.selectAll('.tick text').attr('font-family',"'Share Tech Mono',monospace")
      .attr('font-size',11).attr('fill','#5a6280');
  });

  const timeFmt=S.period==='quarterly'
    ?d=>{const q=Math.ceil((d.getMonth()+1)/3);return `${d.getFullYear()}/${q>1?'Q'+q:'Q1'}`;}
    :d=>String(d.getFullYear());

  g.append('g').attr('transform',`translate(0,${iH})`).call(
    d3.axisBottom(x).tickFormat(timeFmt)
  ).call(g2=>{
    g2.select('.domain').attr('stroke','rgba(255,255,255,0.1)');
    g2.selectAll('.tick line').attr('stroke','rgba(255,255,255,0.1)');
    g2.selectAll('.tick text').attr('font-family',"'Share Tech Mono',monospace")
      .attr('font-size',11).attr('fill','#5a6280').attr('dy','1.3em');
  });

  if (estPts.length>1) {
    g.append('path').datum(estPts)
      .attr('fill','none').attr('stroke','var(--blue)')
      .attr('stroke-width',2).attr('stroke-dasharray','6 4')
      .attr('d',d3.line().x(d=>x(d.date)).y(d=>y(d.estimate)).curve(d3.curveMonotoneX));

    g.selectAll('.est-dot').data(estPts).join('circle')
      .attr('cx',d=>x(d.date)).attr('cy',d=>y(d.estimate))
      .attr('r',4).attr('fill','var(--bg2)')
      .attr('stroke','var(--blue)').attr('stroke-width',2)
      .on('mousemove',(e,d)=>showTip(
        `<div class="tip-title">${timeFmt(d.date)}</div>
         <div class="tip-row"><span class="tip-key">预估</span><span class="tip-val">${fmt(d.estimate,metric)}</span></div>`,e))
      .on('mouseleave',hideTip);
  }

  g.append('path').datum(actual)
    .attr('fill','none').attr('stroke','var(--orange)')
    .attr('stroke-width',2.5)
    .attr('d',d3.line().x(d=>x(d.date)).y(d=>y(d.value)).curve(d3.curveMonotoneX));

  g.selectAll('.act-dot').data(actual).join('circle')
    .attr('cx',d=>x(d.date)).attr('cy',d=>y(d.value))
    .attr('r',5).attr('fill','var(--orange)')
    .attr('stroke','var(--bg2)').attr('stroke-width',2)
    .on('mousemove',(e,d)=>{
      const ds=d3.timeFormat('%Y-%m-%d')(d.date);
      const est=estMap[ds];
      const diff=est!=null?d.value-est:null;
      const beat=diff!=null&&diff>=0;
      showTip(`<div class="tip-title">${timeFmt(d.date)}</div>
        <div class="tip-row"><span class="tip-key">实际</span><span class="tip-val">${fmt(d.value,metric)}</span></div>
        ${est!=null?`<div class="tip-row"><span class="tip-key">预估</span><span class="tip-val">${fmt(est,metric)}</span></div>
        <div class="tip-row"><span class="tip-key">差值</span><span class="${beat?'tip-beat':'tip-miss'}">${beat?'+':''}${fmt(diff,metric)}</span></div>`:''}`,e);
    })
    .on('mouseleave',hideTip);

  if (actual.length<=12) {
    g.selectAll('.act-lbl').data(actual).join('text')
      .attr('x',d=>x(d.date)).attr('y',d=>y(d.value)-12)
      .attr('text-anchor','middle')
      .attr('font-family',"'Share Tech Mono',monospace")
      .attr('font-size',11).attr('fill','var(--orange)')
      .text(d=>fmt(d.value,metric));
  }
}

window.addEventListener('resize', ()=>{
  if (S.ticker) { renderSankey(); renderForecast(); }
});
init();
</script>
</body>
</html>
