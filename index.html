<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Institutional Grade Financial Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0c; --card: #141417; --border: #2d2d32;
            --blue: #007aff; --orange: #ff9500; --text: #e2e2e7; --dim: #8e8e93;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 24px; }
        .dashboard { display: grid; grid-template-columns: 1.2fr 1fr; gap: 24px; max-width: 1600px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; position: relative; }
        .card-header { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-bottom: 24px; display: flex; align-items: center; }
        .card-header::before { content: ''; width: 3px; height: 14px; background: var(--blue); margin-right: 10px; border-radius: 2px; }
        svg { width: 100%; height: 450px; overflow: visible; }
        .axis text { fill: var(--dim); font-size: 11px; }
        .axis path, .axis line { stroke: var(--border); }
        .tooltip { position: absolute; background: rgba(20,20,23,0.9); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; opacity: 0; z-index: 100; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="card">
            <div class="card-header">资金流向 (桑基图 - 最新季度)</div>
            <svg id="sankey-view"></svg>
        </div>
        <div class="card">
            <div class="card-header">EPS 与营收趋势 (季度)</div>
            <svg id="trend-view"></svg>
        </div>
    </div>
    <div id="tip" class="tooltip"></div>

    <script>
    const COLORS = { blue: '#007aff', orange: '#ff9500', green: '#34c759', gray: '#3a3a3c' };

    async function start() {
        const [sankeyRaw, trendRaw] = await Promise.all([
            d3.csv("data/sankey.csv"), d3.csv("data/trend.csv")
        ]);

        const ticker = new URLSearchParams(window.location.search).get('s') || "U";
        renderSankey(sankeyRaw.find(d => d.ticker === ticker), ticker);
        renderTrend(trendRaw.filter(d => d.ticker === ticker));
    }

    function renderSankey(d, ticker) {
        if (!d) return;
        const svg = d3.select("#sankey-view"), width = 700, height = 400;
        svg.selectAll("*").remove();

        const data = {
            nodes: [{name:"营收"}, {name:"成本"}, {name:"毛利"}, {name:"研发"}, {name:"营销/管理"}, {name:"净利"}],
            links: [
                {source:0, target:1, value: +d.cost_of_revenue},
                {source:0, target:2, value: +d.gross_profit},
                {source:2, target:3, value: +d.rd_expense},
                {source:2, target:4, value: +d.sga_expense},
                {source:2, target:5, value: Math.max(0, +d.net_income)}
            ]
        };

        const sankey = d3.sankey().nodeWidth(10).nodePadding(50).extent([[10, 10], [width-180, height-10]]);
        const {nodes, links} = sankey(data);

        // 连线：改用半透明平滑带
        svg.append("g").selectAll("path").data(links).join("path")
            .attr("d", d3.sankeyLinkHorizontal()).attr("stroke", COLORS.blue).attr("stroke-opacity", 0.2)
            .attr("fill", "none").attr("stroke-width", d => d.width);

        // 节点
        svg.append("g").selectAll("rect").data(nodes).join("rect")
            .attr("x", d => d.x0).attr("y", d => d.y0).attr("width", d => d.x1 - d.x0).attr("height", d => d.y1 - d.y0)
            .attr("fill", (d,i) => i===5 ? COLORS.green : COLORS.blue).attr("rx", 2);

        // 文字：动态对齐解决遮挡
        svg.append("g").selectAll("text").data(nodes).join("text")
            .attr("x", d => d.x0 < width/2 ? d.x1 + 12 : d.x0 - 12)
            .attr("y", d => (d.y0 + d.y1) / 2).attr("dy", "0.35em")
            .attr("text-anchor", d => d.x0 < width/2 ? "start" : "end")
            .attr("fill", "var(--text)").style("font-size", "12px").style("font-weight", "500")
            .text(d => `${d.name} $${(d.value/1e8).toFixed(1)}亿`);
    }

    function renderTrend(data) {
        const svg = d3.select("#trend-view"), width = 600, height = 400, margin = {t:20, r:40, b:40, l:40};
        svg.selectAll("*").remove();

        const x = d3.scalePoint().domain(data.map(d => d.label)).range([margin.l, width - margin.r]);
        const yRev = d3.scaleLinear().domain([0, d3.max(data, d => +d.revenue)*1.2]).range([height - margin.b, margin.t]);
        const yEps = d3.scaleLinear().domain([d3.min(data, d => +d.eps)*1.2, d3.max(data, d => +d.eps)*1.2]).range([height - margin.b, margin.t]);

        // 1. 营收面积图 (Revenue Area)
        const area = d3.area().x(d => x(d.label)).y0(yRev(0)).y1(d => yRev(+d.revenue)).curve(d3.curveMonotoneX);
        svg.append("path").datum(data).attr("fill", COLORS.blue).attr("fill-opacity", 0.1).attr("d", area);

        // 2. EPS 趋势线 (Line)
        const line = d3.line().x(d => x(d.label)).y(d => yEps(+d.eps)).curve(d3.curveMonotoneX);
        svg.append("path").datum(data).attr("fill", "none").attr("stroke", COLORS.orange).attr("stroke-width", 2.5).attr("d", line);

        // 3. 数据点
        svg.selectAll("circle").data(data).join("circle")
            .attr("cx", d => x(d.label)).attr("cy", d => yEps(+d.eps)).attr("r", 4).attr("fill", COLORS.orange).attr("stroke", var("--bg")).attr("stroke-width", 2);

        // 坐标轴
        svg.append("g").attr("transform", `translate(0,${height - margin.b})`).attr("class", "axis").call(d3.axisBottom(x).tickSize(0).tickPadding(10));
        svg.append("g").attr("transform", `translate(${margin.l},0)`).attr("class", "axis").call(d3.axisLeft(yRev).ticks(5).tickFormat(d => `$${d}B`));
    }

    start();
    </script>
</body>
</html>
