<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Dashboard - Production Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ── 完全保留你的原版像素风 CSS ── */
:root {
  --bg: #0f1117; --bg2: #181c27; --bg3: #1e2433; --bg4: #252b3b;
  --border: #2e3548; --ink: #e8eaf0; --ink2: #a0a8bc; --ink3: #5a6280;
  --blue: #4a8fff; --blue2: #1a5acc; --orange: #ff9a3c; --orange2: #cc6800;
  --red: #ff5a6e; --red2: #cc2238; --green: #36c97e; --green2: #1a8a52;
  --mono: 'Share Tech Mono', monospace; --pixel: 'Press Start 2P', monospace; --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--ink); font-family: var(--mono); min-height: 100vh; overflow-x: hidden; }
header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 200; }
.logo { font-family: var(--pixel); font-size: 14px; color: var(--blue); letter-spacing: 2px; }
.ticker-tabs { display: flex; gap: 6px; }
.ticker-btn { font-family: var(--pixel); font-size: 10px; padding: 8px 12px; border-radius: var(--radius); background: var(--bg3); border: 1px solid var(--border); color: var(--ink2); cursor: pointer; }
.ticker-btn.active { background: var(--blue2); border-color: var(--blue); color: #fff; }
.controls { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 24px; display: flex; gap: 12px; align-items: center; }
.period-btn { font-family: var(--pixel); font-size: 10px; padding: 8px 14px; background: transparent; border: 1px solid var(--border); color: var(--ink2); cursor: pointer; }
.period-btn.active { background: var(--blue2); color: #fff; }
main { padding: 20px 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 1600px; margin: 0 auto; }
.col-full { grid-column: 1 / -1; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg3); }
.card-title { font-family: var(--pixel); font-size: 12px; color: var(--ink); }
.chart-scroll-wrap { width: 100%; overflow-x: auto; }
.kpi-row { display: flex; gap: 12px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
.kpi { display: flex; flex-direction: column; gap: 4px; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; flex: 1; min-width: 140px; }
.kpi-label { font-size: 12px; color: var(--ink3); }
.kpi-value { font-size: 18px; font-weight: 700; color: var(--ink); }
.kpi-value.pos { color: var(--green); }
.kpi-value.neg { color: var(--red); }
.tooltip { position: fixed; z-index: 999; background: var(--bg3); color: var(--ink); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; padding: 10px; pointer-events: none; opacity: 0; transition: opacity .1s; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
.tip-row { display: flex; justify-content: space-between; gap: 12px; }
.sankey-nav { display: flex; align-items: center; gap: 8px; }
.nav-arrow { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--bg4); border: 1px solid var(--border); cursor: pointer; color: var(--ink2); }
</style>
</head>
<body>

<header>
  <div class="logo">CHARTS</div>
  <div class="ticker-tabs" id="ticker-tabs"></div>
  <div class="meta-info" id="meta-info">—</div>
</header>

<div class="controls">
  <div class="period-picker">
    <button class="period-btn active" id="btn-q" onclick="setPeriod('quarterly')">季报</button>
    <button class="period-btn" id="btn-a" onclick="setPeriod('annual')">年报</button>
  </div>
</div>

<main>
  <div class="card col-full" id="card-sankey">
    <div class="card-header">
      <span class="card-title">收支拆解</span>
      <div class="sankey-nav">
        <div class="nav-arrow" onclick="shiftSankey(-1)">◀</div>
        <div id="sankey-label" style="font-family:var(--pixel);font-size:10px;color:var(--orange)">—</div>
        <div class="nav-arrow" onclick="shiftSankey(1)">▶</div>
      </div>
    </div>
    <div class="kpi-row" id="kpi-row"></div>
    <div class="card-body">
      <div class="chart-scroll-wrap">
        <svg id="sankey-svg" style="width:100%; min-height:400px; display:block"></svg>
      </div>
    </div>
  </div>

  <div class="card col-full">
    <div class="card-header">
      <span class="card-title">财务趋势</span>
      <div id="forecast-tabs" style="display:flex; gap:5px"></div>
    </div>
    <div class="card-body">
      <svg id="forecast-svg" style="width:100%; height:280px; display:block"></svg>
    </div>
  </div>
</main>

<div class="tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
// ── STATE & CONSTANTS ──
const S = {
  tickers:[], ticker:null, period:'quarterly', sankeyIdx:0, forecastMetric:'total_revenue',
  _sankeyAll:null, _trendAll:null, _estAll:null, sankey:{}, trend:{}, est:{}
};

const METRIC_LABELS = { total_revenue:'总收入', eps_diluted:'每股收益', operating_income:'营业利润' };

const C = {
  rev: '#4a8fff', cogs: '#c87832', gross: '#ff9a3c',
  rd: '#36c97e', sga: '#4a8fff', opPool: '#a0a8bc',
  opInc: '#36c97e', opLoss: '#ff5a6e', tax: '#9a8060', net: '#36c97e'
};

// ── 完整的 Node 定义 ──
const nodeList = [
  {id:0, name:'营业收入', color:C.rev},
  {id:1, name:'销售成本', color:C.cogs},
  {id:2, name:'毛利', color:C.gross},
  {id:3, name:'研发费用', color:C.rd},
  {id:4, name:'销售及行政', color:C.sga},
  {id:5, name:'营业利润', color:C.opInc},
  {id:6, name:'营业亏损', color:C.opLoss},
  {id:7, name:'所得税', color:C.tax},
  {id:8, name:'净利润', color:C.net},
  {id:9, name:'净亏损', color:C.opLoss},
  {id:10, name:'费用汇总', color:C.opPool}
];

// ── UTILS ──
const tipEl = document.getElementById('tooltip');
function showTip(html, e) {
  tipEl.innerHTML = html; tipEl.style.opacity=1;
  tipEl.style.left=(e.clientX+15)+'px'; tipEl.style.top=(e.clientY-10)+'px';
}
function hideTip() { tipEl.style.opacity=0; }

function fmt(v, metric) {
  if (v==null||isNaN(v)) return '—';
  const s=v<0?'-':'', a=Math.abs(v);
  if (metric==='eps_diluted') return s+a.toFixed(2);
  if (a>=1e8) return s+(a/1e8).toFixed(2)+'亿';
  if (a>=1e4) return s+(a/1e4).toFixed(2)+'万';
  return s+a.toFixed(0);
}

// ── CORE LOGIC ──
async function init() {
  const [s, t, e] = await Promise.all([
    d3.csv('data/sankey.csv'), d3.csv('data/trend.csv'), d3.csv('data/estimates.csv')
  ]);
  S._sankeyAll=s; S._trendAll=t; S._estAll=e;
  S.tickers = [...new Set(s.map(d=>d.ticker))];
  
  const tabs = document.getElementById('ticker-tabs');
  S.tickers.forEach(t => {
    const b=document.createElement('button');
    b.className='ticker-btn'; b.textContent=t; b.onclick=()=>selectTicker(t);
    tabs.appendChild(b);
  });

  const ftabs = document.getElementById('forecast-tabs');
  Object.entries(METRIC_LABELS).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='period-btn'; b.textContent=v; b.onclick=()=>{
      S.forecastMetric=k; 
      document.querySelectorAll('#forecast-tabs .period-btn').forEach(btn=>btn.classList.remove('active'));
      b.classList.add('active');
      renderForecast();
    };
    ftabs.appendChild(b);
  });

  selectTicker(S.tickers[0]);
}

function selectTicker(t) {
  S.ticker=t;
  S.sankey[t]=S._sankeyAll.filter(r=>r.ticker===t);
  S.trend[t]=S._trendAll.filter(r=>r.ticker===t);
  S.est[t]=S._estAll.filter(r=>r.ticker===t);
  S.sankeyIdx = getSankeyDates().length - 1;
  renderSankey(); renderForecast();
}

function getSankeyDates() {
  return [...new Set(S.sankey[S.ticker].filter(r=>r.period_type===S.period).map(r=>r.date))].sort();
}

function shiftSankey(d) {
  const dates = getSankeyDates();
  S.sankeyIdx = Math.max(0, Math.min(dates.length-1, S.sankeyIdx+d));
  renderSankey();
}

function setPeriod(p) {
  S.period=p; 
  document.getElementById('btn-q').classList.toggle('active', p==='quarterly');
  document.getElementById('btn-a').classList.toggle('active', p==='annual');
  S.sankeyIdx = getSankeyDates().length - 1;
  renderSankey(); renderForecast();
}

// ── SANKEY RENDER ──
function renderSankey() {
  const dates = getSankeyDates(), date = dates[S.sankeyIdx];
  document.getElementById('sankey-label').textContent = date || 'N/A';
  
  const rows = S.sankey[S.ticker].filter(r=>r.period_type===S.period && r.date===date);
  const svg = d3.select('#sankey-svg');
  svg.selectAll('*').remove();
  if(!rows.length) return;

  const r = rows[0];
  const g = k => parseFloat(r[k]) || 0;

  const totalRev = g('total_revenue'), cogs = g('cost_of_revenue'), grossP = g('gross_profit');
  const opExp = g('operating_expenses'), rdExp = g('rd_expense'), sgaExp = g('sga_expense');
  const opInc = g('operating_income'), netInc = g('net_income'), tax = g('tax_provision');
  const eps = 0.1;

  // KPI Strip
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi"><span class="kpi-label">营收</span><span class="kpi-value">${fmt(totalRev)}</span></div>
    <div class="kpi"><span class="kpi-label">毛利率</span><span class="kpi-value">${((grossP/totalRev)*100).toFixed(1)}%</span></div>
    <div class="kpi"><span class="kpi-label">营业利润</span><span class="kpi-value ${opInc>=0?'pos':'neg'}">${fmt(opInc)}</span></div>
    <div class="kpi"><span class="kpi-label">净利润</span><span class="kpi-value ${netInc>=0?'pos':'neg'}">${fmt(netInc)}</span></div>
  `;

  // 能量守恒 Links 构建
  const links = [];
  // 层1: 营收拆解
  links.push({source:0, target:1, value: Math.max(cogs, eps)});
  links.push({source:0, target:2, value: Math.max(grossP, eps)});

  // 层2 & 3: 盈亏对冲逻辑
  if (opInc >= 0) {
    links.push({source:2, target:10, value: Math.max(opExp, eps)}); // 毛利流向费用汇总
    links.push({source:2, target:5, value: Math.max(opInc, eps)});  // 毛利流向利润
  } else {
    links.push({source:2, target:10, value: Math.max(grossP, eps)}); // 毛利全部填坑
    links.push({source:6, target:10, value: Math.max(Math.abs(opInc), eps)}); // 亏损补充费用
  }

  // 层4: 费用细分
  if (opExp > 0) {
    links.push({source:10, target:3, value: Math.max(rdExp, eps)});
    links.push({source:10, target:4, value: Math.max(sgaExp, eps)});
  }

  // 层5: 税与净利
  if (opInc > 0) {
    links.push({source:5, target:7, value: Math.max(Math.abs(tax), eps)});
    links.push({source:5, target:netInc>=0?8:9, value: Math.max(Math.abs(netInc), eps)});
  }

  const W = document.getElementById('card-sankey').clientWidth - 40;
  const H = 420;
  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('height', H);

  const usedIds = new Set(links.flatMap(l=>[l.source, l.target]));
  const nodes = nodeList.filter(n=>usedIds.has(n.id)).map(d=>({...d}));
  
  const sankey = d3.sankey().nodeWidth(24).nodePadding(30).extent([[1, 10], [W - 160, H - 10]]);
  const graph = sankey({ nodes, links: links.map(d=>({...d})) });

  const gMain = svg.append('g');

  // Links
  gMain.selectAll('path').data(graph.links).enter().append('path')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', d => d.target.color).attr('stroke-width', d => Math.max(1, d.width))
    .attr('fill', 'none').attr('stroke-opacity', 0.15);

  // Nodes
  const node = gMain.selectAll('.node').data(graph.nodes).enter().append('g');
  node.append('rect')
    .attr('x', d=>d.x0).attr('y', d=>d.y0)
    .attr('height', d=>Math.max(2, d.y1-d.y0)).attr('width', 24)
    .attr('fill', d=>d.color).attr('rx', 3)
    .on('mousemove', (e,d)=>showTip(`<b>${d.name}</b><br>金额: ${fmt(d.value)}`, e))
    .on('mouseleave', hideTip);

  node.append('text')
    .attr('x', d=>d.x1+10).attr('y', d=>(d.y0+d.y1)/2)
    .attr('dy', '0.35em').attr('fill', '#e8eaf0').style('font-size', '13px').style('font-weight', '600')
    .text(d => `${d.name} ${fmt(d.value)}`);
}

// ── TREND RENDER ──
function renderForecast() {
  const metric = S.forecastMetric;
  const actual = (S.trend[S.ticker]||[]).filter(r=>r.period_type===S.period && r.metric===metric)
                 .map(r=>({date: new Date(r.date), value: +r.value})).sort((a,b)=>a.date-b.date);
  
  const svg = d3.select('#forecast-svg');
  svg.selectAll('*').remove();
  if(!actual.length) return;

  const W = document.getElementById('card-sankey').clientWidth - 40, H = 280;
  const M = {top:30, right:30, bottom:40, left:60};
  const iW = W-M.left-M.right, iH = H-M.top-M.bottom;

  const g = svg.attr('viewBox',`0 0 ${W} ${H}`).append('g').attr('transform',`translate(${M.left},${M.top})`);

  const x = d3.scaleTime().domain(d3.extent(actual, d=>d.date)).range([0, iW]);
  const y = d3.scaleLinear().domain(d3.extent(actual, d=>d.value)).nice().range([iH, 0]);

  g.append('g').attr('transform',`translate(0,${iH})`).call(d3.axisBottom(x).ticks(5).tickSize(-iH)).attr('color','#2e3548');
  g.append('g').call(d3.axisLeft(y).ticks(5).tickSize(-iW)).attr('color','#2e3548');

  const line = d3.line().x(d=>x(d.date)).y(d=>y(d.value)).curve(d3.curveMonotoneX);
  g.append('path').datum(actual).attr('fill','none').attr('stroke',C.rev).attr('stroke-width',2).attr('d',line);

  g.selectAll('circle').data(actual).enter().append('circle')
    .attr('cx', d=>x(d.date)).attr('cy', d=>y(d.value)).attr('r', 4).attr('fill', C.rev)
    .on('mousemove', (e,d)=>showTip(`日期: ${d.date.toLocaleDateString()}<br>值: ${fmt(d.value, metric)}`, e))
    .on('mouseleave', hideTip);
}

init();
</script>
</body>
</html>
